<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도서관 독서 목록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8; --warm-white: #faf7f2;
    --gold: #b8953a; --gold-light: #d4a84b;
    --dark: #1c1a17; --brown: #4a3728; --brown-light: #7a5c44;
    --border: #d4c9b0; --shadow: rgba(28,26,23,0.12);
    --read-bg: #eef5ec; --read-border: #8ab87a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background-color: var(--cream); color: var(--dark); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }

  /* HEADER */
  header { background: var(--dark); border-bottom: 3px solid var(--gold); padding: 24px 36px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .header-title { font-family: 'Cormorant Garamond', serif; font-size: 1.9rem; color: var(--gold-light); letter-spacing: 0.05em; }
  .header-subtitle { font-family: 'Noto Serif KR', serif; font-size: 0.78rem; color: #a09070; margin-top: 2px; letter-spacing: 0.1em; }
  .header-stats { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .stat-box { text-align: center; background: rgba(184,149,58,0.1); border: 1px solid rgba(184,149,58,0.3); border-radius: 4px; padding: 8px 16px; }
  .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--gold-light); line-height: 1; }
  .stat-label { font-size: 0.65rem; color: #888; letter-spacing: 0.08em; margin-top: 2px; }

  .container { max-width: 1140px; margin: 0 auto; padding: 28px 20px; }

  /* TABS & FILTERS */
  .section-tabs { display: flex; margin-bottom: 24px; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
  .tab-btn { flex: 1; padding: 11px; text-align: center; background: var(--warm-white); border: none; cursor: pointer; font-family: 'Noto Serif KR', serif; font-size: 0.83rem; color: var(--brown-light); border-right: 1px solid var(--border); transition: all 0.2s; }
  .tab-btn:last-child { border-right: none; }
  .tab-btn.active { background: var(--dark); color: var(--gold-light); }
  .tab-btn:hover:not(.active) { background: var(--cream); }

  .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
  .filter-bar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .filter-label { font-size: 0.72rem; color: #a09070; }
  .filter-btn { padding: 5px 13px; border: 1px solid var(--border); background: var(--warm-white); border-radius: 20px; font-size: 0.76rem; cursor: pointer; color: var(--brown-light); transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active { background: var(--dark); color: var(--gold-light); border-color: var(--dark); }

  /* VIEW TOGGLE */
  .view-toggle { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
  .view-btn { padding: 6px 13px; background: var(--warm-white); border: none; cursor: pointer; font-size: 0.8rem; color: var(--brown-light); border-right: 1px solid var(--border); transition: all 0.15s; }
  .view-btn:last-child { border-right: none; }
  .view-btn.active { background: var(--dark); color: var(--gold-light); }

  /* PROGRESS */
  .progress-wrap { margin-bottom: 24px; }
  .progress-info { display: flex; justify-content: space-between; font-size: 0.75rem; color: #a09070; margin-bottom: 6px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 2px; transition: width 0.6s ease; }

  /* CATEGORY */
  .books-area { display: flex; flex-direction: column; gap: 28px; }
  .category-block { animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  .category-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .category-icon { width: 26px; height: 26px; background: var(--dark); color: var(--gold); border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; }
  .category-name { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 600; color: var(--brown); }
  .cat-read-info { margin-left: auto; font-size: 0.72rem; color: #a09070; }

  /* ── LIST VIEW ── */
  .book-list-view { display: flex; flex-direction: column; gap: 8px; }
  .book-card-list { background: var(--warm-white); border: 1px solid var(--border); border-left: 3px solid transparent; border-radius: 2px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; transition: all 0.18s; cursor: default; position: relative; }
  .book-card-list:hover { border-left-color: var(--gold); box-shadow: 0 2px 8px var(--shadow); }
  .book-card-list.read { background: var(--read-bg); border-left-color: var(--read-border); opacity: 0.82; }
  .book-card-list.read .book-title { text-decoration: line-through; text-decoration-color: var(--read-border); color: #888; }

  /* Cover thumbnail in list */
  .list-cover { width: 44px; height: 58px; border-radius: 2px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border); cursor: pointer; }
  .list-cover-placeholder { width: 44px; height: 58px; background: var(--cream); border: 1.5px dashed var(--border); border-radius: 2px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: border-color 0.15s; font-size: 1.1rem; color: #ccc; }
  .list-cover-placeholder:hover { border-color: var(--gold); color: var(--gold); }

  .book-num { font-family: 'Cormorant Garamond', serif; font-size: 0.78rem; color: #c0b090; min-width: 20px; }
  .book-check { width: 18px; height: 18px; border: 1.5px solid var(--border); border-radius: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-size: 0.65rem; cursor: pointer; }
  .book-card-list.read .book-check { background: var(--read-border); border-color: var(--read-border); color: white; }
  .book-info { flex: 1; min-width: 0; }
  .book-title { font-family: 'Noto Serif KR', serif; font-size: 0.88rem; font-weight: 600; color: var(--dark); line-height: 1.4; }
  .book-pub { font-size: 0.7rem; color: #b0a088; margin-top: 1px; }
  .book-note { font-size: 0.7rem; color: var(--brown-light); margin-top: 4px; background: rgba(184,149,58,0.07); border-left: 2px solid var(--gold); padding: 3px 6px; border-radius: 0 2px 2px 0; }

  /* ── GRID VIEW ── */
  .book-grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; }
  .book-card-grid { background: var(--warm-white); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; transition: all 0.18s; cursor: default; position: relative; display: flex; flex-direction: column; }
  .book-card-grid:hover { box-shadow: 0 4px 14px var(--shadow); transform: translateY(-2px); }
  .book-card-grid.read { opacity: 0.75; }
  .book-card-grid.read .book-title { text-decoration: line-through; text-decoration-color: var(--read-border); color: #888; }

  .grid-cover-wrap { width: 100%; aspect-ratio: 3/4; position: relative; overflow: hidden; background: var(--cream); cursor: pointer; }
  .grid-cover-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .grid-cover-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; color: #ccc; font-size: 1.6rem; transition: all 0.15s; }
  .grid-cover-placeholder span { font-size: 0.65rem; color: #bbb; }
  .grid-cover-wrap:hover .grid-cover-placeholder { color: var(--gold); background: rgba(184,149,58,0.04); }
  .grid-cover-wrap:hover .grid-cover-placeholder span { color: var(--gold); }

  .read-badge { position: absolute; top: 6px; right: 6px; background: var(--read-border); color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; }
  .grid-num { position: absolute; top: 6px; left: 6px; background: rgba(28,26,23,0.7); color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 0.72rem; padding: 1px 5px; border-radius: 2px; }

  .grid-check-btn { position: absolute; bottom: 6px; right: 6px; width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.7); background: rgba(28,26,23,0.45); color: white; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
  .book-card-grid.read .grid-check-btn { background: var(--read-border); border-color: var(--read-border); }
  .grid-check-btn:hover { background: var(--gold); border-color: var(--gold); }

  .grid-body { padding: 8px 9px; flex: 1; }
  .grid-title { font-family: 'Noto Serif KR', serif; font-size: 0.75rem; font-weight: 600; color: var(--dark); line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .grid-pub { font-size: 0.62rem; color: #b0a088; margin-top: 2px; }

  /* MODAL for photo upload */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--warm-white); border: 1px solid var(--border); border-top: 3px solid var(--gold); border-radius: 3px; padding: 28px 32px; max-width: 400px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.2); animation: modalIn 0.2s ease; }
  @keyframes modalIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:none; } }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--brown); margin-bottom: 18px; }
  .modal-book-name { font-family: 'Noto Serif KR', serif; font-size: 0.85rem; color: var(--dark); font-weight: 600; margin-bottom: 16px; padding: 8px 12px; background: var(--cream); border-left: 3px solid var(--gold); }

  /* Drop zone */
  .drop-zone { border: 2px dashed var(--border); border-radius: 3px; padding: 28px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--cream); margin-bottom: 14px; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--gold); background: rgba(184,149,58,0.05); }
  .drop-zone-icon { font-size: 2rem; margin-bottom: 8px; }
  .drop-zone-text { font-size: 0.82rem; color: var(--brown-light); }
  .drop-zone-sub { font-size: 0.72rem; color: #bbb; margin-top: 4px; }
  .drop-zone input[type=file] { display: none; }

  .preview-img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 2px; margin-bottom: 14px; border: 1px solid var(--border); display: none; }

  .url-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .url-input { flex: 1; border: 1px solid var(--border); border-radius: 2px; padding: 8px 10px; font-size: 0.8rem; background: var(--cream); color: var(--dark); outline: none; }
  .url-input:focus { border-color: var(--gold); }
  .url-input::placeholder { color: #ccc; }
  .btn-sm { padding: 8px 14px; background: var(--dark); color: var(--gold-light); border: 1px solid var(--gold); font-size: 0.78rem; cursor: pointer; border-radius: 2px; white-space: nowrap; }
  .btn-sm:hover { background: var(--brown); }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .btn-cancel { background: transparent; color: var(--brown-light); border: 1px solid var(--border); padding: 8px 16px; font-size: 0.8rem; cursor: pointer; border-radius: 2px; }
  .btn-cancel:hover { background: var(--cream); }
  .btn-save { background: var(--dark); color: var(--gold-light); border: 1px solid var(--gold); padding: 8px 20px; font-size: 0.82rem; cursor: pointer; border-radius: 2px; }
  .btn-save:hover { background: var(--brown); }
  .btn-remove-photo { background: transparent; color: #c0392b; border: 1px solid #e0b0b0; padding: 8px 14px; font-size: 0.78rem; cursor: pointer; border-radius: 2px; }
  .btn-remove-photo:hover { background: #fff0f0; }

  /* ADD SECTION */
  .add-section { background: var(--warm-white); border: 1px solid var(--border); border-top: 3px solid var(--gold); border-radius: 2px; padding: 24px 28px; margin-top: 36px; box-shadow: 0 2px 12px var(--shadow); }
  .section-label { font-family: 'Noto Serif KR', serif; font-size: 0.72rem; letter-spacing: 0.18em; color: var(--gold); text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .ai-input-area { width: 100%; border: 1px solid var(--border); border-radius: 2px; padding: 14px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.83rem; line-height: 1.7; color: var(--dark); background: var(--cream); resize: vertical; min-height: 90px; outline: none; }
  .ai-input-area:focus { border-color: var(--gold); }
  .ai-input-area::placeholder { color: #c0b8a8; }
  .input-hint { font-size: 0.72rem; color: #a09070; margin-top: 6px; font-style: italic; }
  .btn-row { display: flex; gap: 8px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
  .btn-primary { background: var(--dark); color: var(--gold-light); border: 1px solid var(--gold); padding: 9px 20px; font-family: 'Noto Serif KR', serif; font-size: 0.83rem; cursor: pointer; border-radius: 2px; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .btn-primary:hover { background: var(--brown); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-danger { background: transparent; color: #c0392b; border: 1px solid #e0b0b0; padding: 9px 16px; font-size: 0.78rem; cursor: pointer; border-radius: 2px; }
  .btn-danger:hover { background: #fff0f0; }
  .loading-indicator { display: none; align-items: center; gap: 8px; color: var(--gold); font-size: 0.8rem; font-style: italic; }
  .loading-indicator.active { display: flex; }
  .spinner { width: 13px; height: 13px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .manual-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .manual-input { flex: 1; min-width: 120px; border: 1px solid var(--border); border-radius: 2px; padding: 8px 10px; font-size: 0.8rem; background: var(--cream); color: var(--dark); outline: none; }
  .manual-input:focus { border-color: var(--gold); }
  .manual-input::placeholder { color: #c0b8a8; }

  footer { text-align: center; padding: 20px; color: #c0b8a8; font-size: 0.7rem; letter-spacing: 0.08em; border-top: 1px solid var(--border); margin-top: 40px; }
  @media(max-width:600px) { header { padding: 16px 18px; } .header-title { font-size: 1.4rem; } .container { padding: 16px 12px; } .book-grid-view { grid-template-columns: repeat(auto-fill, minmax(110px,1fr)); gap: 10px; } }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">📚 도서관 독서 목록</div>
    <div class="header-subtitle">초등 중학년 (8–10세) · 이달의 도전</div>
  </div>
  <div class="header-stats">
    <div class="stat-box"><div class="stat-num" id="total-count">0</div><div class="stat-label">전체 도서</div></div>
    <div class="stat-box"><div class="stat-num" id="read-count">0</div><div class="stat-label">읽은 책</div></div>
    <div class="stat-box"><div class="stat-num" id="pct-count">0%</div><div class="stat-label">달성률</div></div>
  </div>
</header>

<div class="container">
  <!-- TABS -->
  <div class="section-tabs">
    <button class="tab-btn active" onclick="setSection('all',this)">전체 (70권)</button>
    <button class="tab-btn" onclick="setSection('비문학',this)">📘 비문학·지식 (30권)</button>
    <button class="tab-btn" onclick="setSection('문학',this)">📖 문학·이야기 (40권)</button>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-info"><span id="progress-label">전체 진행</span><span id="progress-pct">0 / 0권</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="filter-bar">
      <span class="filter-label">상태</span>
      <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('unread',this)">안읽은 책</button>
      <button class="filter-btn" onclick="setFilter('read',this)">읽은 책 ✓</button>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" onclick="setView('list',this)" title="목록 보기">☰ 목록</button>
      <button class="view-btn" onclick="setView('grid',this)" title="표지 보기">⊞ 표지</button>
    </div>
  </div>

  <!-- BOOKS -->
  <div class="books-area" id="books-area"></div>

  <!-- ADD SECTION -->
  <div class="add-section">
    <div class="section-label">✦ AI로 책 추가</div>
    <textarea class="ai-input-area" id="ai-input" placeholder="추가할 책 목록을 입력하면 AI가 자동 분류합니다.&#10;예) 과학: 신비한 자연의 세계, 별을 보는 아이 (홍길동)"></textarea>
    <div class="input-hint">카테고리를 몰라도 괜찮아요. AI가 자동으로 분류해드려요.</div>
    <div class="btn-row">
      <button class="btn-primary" id="ai-btn" onclick="runAI()">✦ AI로 분류 추가</button>
      <div class="loading-indicator" id="loading"><div class="spinner"></div> AI가 분류 중…</div>
      <button class="btn-danger" onclick="resetAll()">목록 초기화</button>
    </div>
    <div class="section-label" style="margin-top:20px;">✦ 직접 추가</div>
    <div class="manual-row">
      <input class="manual-input" id="m-title" placeholder="책 제목 *">
      <input class="manual-input" id="m-pub" placeholder="출판사 (선택)">
      <input class="manual-input" id="m-cat" placeholder="카테고리 (선택)">
      <input class="manual-input" id="m-section" placeholder="비문학 / 문학">
      <button class="btn-primary" onclick="manualAdd()">+ 추가</button>
    </div>
  </div>
</div>

<footer>도서관 독서 목록 · 8–10세 맞춤 선별 · 표지 사진 업로드 지원</footer>

<!-- PHOTO MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">📷 표지 사진 등록</div>
    <div class="modal-book-name" id="modal-book-name"></div>

    <img class="preview-img" id="preview-img" alt="미리보기">

    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()"
         ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
      <input type="file" id="file-input" accept="image/*" onchange="handleFile(this.files[0])">
      <div class="drop-zone-icon">🖼️</div>
      <div class="drop-zone-text">클릭하거나 사진을 여기에 끌어다 놓으세요</div>
      <div class="drop-zone-sub">JPG, PNG, WEBP 지원</div>
    </div>

    <div style="font-size:0.72rem;color:#a09070;margin-bottom:8px;text-align:center;">— 또는 URL로 입력 —</div>
    <div class="url-row">
      <input class="url-input" id="url-input" placeholder="이미지 주소(URL) 붙여넣기">
      <button class="btn-sm" onclick="applyUrl()">적용</button>
    </div>

    <div class="modal-actions">
      <button class="btn-remove-photo" onclick="removePhoto()" id="btn-remove">🗑 사진 삭제</button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="savePhoto()">저장</button>
    </div>
  </div>
</div>

<script>
// ── PRESET DATA ───────────────────────────────────────────────────────────────
const PRESET = [
  {n:1,title:"신기한 스쿨버스",pub:"비룡소",cat:"과학·자연",section:"비문학",note:"과학 원리를 신나는 버스 여행으로!"},
  {n:2,title:"왜? 호기심 백과",pub:"시공주니어",cat:"과학·자연",section:"비문학",note:"왜? 라는 질문이 있는 한 계속 읽게 돼요"},
  {n:3,title:"우리 몸의 구멍",pub:"비룡소",cat:"과학·자연",section:"비문학",note:"내 몸 속 비밀 탐험 시작!"},

const ICONS = {'과학·자연':'🔬','역사·인물':'🏛️','사회·생각':'🌍','그림책·동화':'✨','모험·판타지':'⛵','우정·성장':'🤝','세계 명작':'📖','국내 창작':'🇰🇷','기타':'📚'};
const KEY = 'lib-books-v3';
const PHOTO_KEY = 'lib-photos-v3'; // separate storage for base64 photos
let books = [], photos = {}, currentFilter='all', currentSection='all', currentView='list';
let modalBookId = null, pendingPhotoData = null;

// ── INIT ─────────────────────────────────────────────────────────────────────
function loadData() {
  try {
    const s = JSON.parse(localStorage.getItem(KEY)||'null');
    books = (s && Array.isArray(s)) ? s : PRESET.map(b=>({...b,id:'p'+b.n,read:false}));
    if (!s) saveBooks();
  } catch(e) { books = PRESET.map(b=>({...b,id:'p'+b.n,read:false})); }
  try { photos = JSON.parse(localStorage.getItem(PHOTO_KEY)||'{}'); } catch(e) { photos={}; }
}
function saveBooks() { localStorage.setItem(KEY, JSON.stringify(books)); }
function savePhotos() { try { localStorage.setItem(PHOTO_KEY, JSON.stringify(photos)); } catch(e) { alert('사진 저장 공간이 부족합니다. 일부 사진을 삭제해주세요.'); } }

// ── CONTROLS ─────────────────────────────────────────────────────────────────
function setSection(s,el){ currentSection=s; document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); render(); }
function setFilter(f,el){ currentFilter=f; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); render(); }
function setView(v,el){ currentView=v; document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); render(); }
function toggleRead(id){ const b=books.find(b=>String(b.id)===String(id)); if(b){b.read=!b.read;saveBooks();render();} }

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  let filtered = books;
  if (currentSection!=='all') filtered=filtered.filter(b=>b.section===currentSection);
  if (currentFilter==='read') filtered=filtered.filter(b=>b.read);
  if (currentFilter==='unread') filtered=filtered.filter(b=>!b.read);

  const total=books.length, readN=books.filter(b=>b.read).length;
  const secAll=books.filter(b=>currentSection==='all'||b.section===currentSection);
  const secRead=secAll.filter(b=>b.read).length;
  document.getElementById('total-count').textContent=total;
  document.getElementById('read-count').textContent=readN;
  document.getElementById('pct-count').textContent=total?Math.round(readN/total*100)+'%':'0%';
  document.getElementById('progress-label').textContent=currentSection==='all'?'전체 진행':currentSection==='비문학'?'비문학 진행':'문학 진행';
  document.getElementById('progress-pct').textContent=secRead+' / '+secAll.length+'권';
  document.getElementById('progress-fill').style.width=secAll.length?(secRead/secAll.length*100)+'%':'0%';

  const area=document.getElementById('books-area');
  if (!filtered.length) {
    area.innerHTML=`<div style="text-align:center;padding:50px;color:#b0a898"><div style="font-size:2.5rem;margin-bottom:12px">📖</div><div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--brown-light)">${currentFilter==='read'?'아직 읽은 책이 없습니다':'모든 책을 읽었습니다! 🎉'}</div></div>`;
    return;
  }

  const cats={};
  filtered.forEach(b=>{ if(!cats[b.cat]) cats[b.cat]=[]; cats[b.cat].push(b); });

  area.innerHTML = Object.entries(cats).map(([cat,bks])=>{
    const icon=ICONS[cat]||'📚';
    const catRead=bks.filter(b=>b.read).length;
    const cardsHtml = currentView==='grid' ? renderGrid(bks) : renderList(bks);
    return `<div class="category-block">
      <div class="category-header">
        <div class="category-icon">${icon}</div>
        <div class="category-name">${cat}</div>
        <div class="cat-read-info">${catRead}/${bks.length}권 읽음</div>
      </div>
      ${cardsHtml}
    </div>`;
  }).join('');
}

function getPhotoEl(b, mode) {
  const src = photos[b.id];
  if (mode==='grid') {
    return `<div class="grid-cover-wrap" onclick="openModal('${b.id}')" title="표지 사진 등록/변경">
      ${src ? `<img src="${src}" alt="표지">` : `<div class="grid-cover-placeholder">📷<span>표지 추가</span></div>`}
      <div class="grid-num">${b.n||''}</div>
      ${b.read ? '<div class="read-badge">✓ 읽음</div>' : ''}
      <div class="grid-check-btn" onclick="event.stopPropagation();toggleRead('${b.id}')" title="${b.read?'안읽음으로':'읽음으로'}">${b.read?'✓':'○'}</div>
    </div>`;
  } else {
    if (src) return `<img class="list-cover" src="${src}" alt="표지" onclick="openModal('${b.id}')" title="표지 사진 변경">`;
    return `<div class="list-cover-placeholder" onclick="openModal('${b.id}')" title="표지 사진 등록">📷</div>`;
  }
}

function renderList(bks) {
  return `<div class="book-list-view">${bks.map(b=>`
    <div class="book-card-list ${b.read?'read':''}">
      ${getPhotoEl(b,'list')}
      <div class="book-num">${b.n||''}</div>
      <div class="book-check" onclick="toggleRead('${b.id}')" title="${b.read?'안읽음으로':'읽음으로'}">${b.read?'✓':''}</div>
      <div class="book-info">
        <div class="book-title">${b.title}</div>
        ${b.pub?`<div class="book-pub">${b.pub}</div>`:''}
        ${b.note?`<div class="book-note">💬 ${b.note}</div>`:''}
      </div>
    </div>`).join('')}</div>`;
}

function renderGrid(bks) {
  return `<div class="book-grid-view">${bks.map(b=>`
    <div class="book-card-grid ${b.read?'read':''}">
      ${getPhotoEl(b,'grid')}
      <div class="grid-body">
        <div class="grid-title">${b.title}</div>
        ${b.pub?`<div class="grid-pub">${b.pub}</div>`:''}
      </div>
    </div>`).join('')}</div>`;
}

// ── PHOTO MODAL ──────────────────────────────────────────────────────────────
function openModal(id) {
  modalBookId = id;
  pendingPhotoData = null;
  const b = books.find(b=>String(b.id)===String(id));
  document.getElementById('modal-book-name').textContent = b ? b.title : '';
  document.getElementById('url-input').value = '';
  const preview = document.getElementById('preview-img');
  const existing = photos[id];
  if (existing) { preview.src=existing; preview.style.display='block'; }
  else { preview.style.display='none'; }
  document.getElementById('btn-remove').style.display = existing ? 'inline-block' : 'none';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); modalBookId=null; pendingPhotoData=null; }

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    pendingPhotoData = e.target.result;
    const preview = document.getElementById('preview-img');
    preview.src = pendingPhotoData;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function handleDragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
function handleDragLeave(e) { document.getElementById('drop-zone').classList.remove('drag-over'); }
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleFile(file);
}

function applyUrl() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  pendingPhotoData = url;
  const preview = document.getElementById('preview-img');
  preview.src = url;
  preview.style.display = 'block';
}

function savePhoto() {
  if (!modalBookId) { closeModal(); return; }
  if (pendingPhotoData) {
    photos[modalBookId] = pendingPhotoData;
    savePhotos();
  }
  closeModal();
  render();
}

function removePhoto() {
  if (!modalBookId) return;
  delete photos[modalBookId];
  savePhotos();
  closeModal();
  render();
}

// close on overlay click
document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

// ── AI ADD ───────────────────────────────────────────────────────────────────
async function runAI() {
  const text=document.getElementById('ai-input').value.trim();
  if(!text){alert('책 목록을 입력해주세요.');return;}
  const btn=document.getElementById('ai-btn'), loading=document.getElementById('loading');
  btn.disabled=true; loading.classList.add('active');
  const prompt=`당신은 어린이 도서 전문 사서입니다. 다음 책 목록을 분석하여 JSON으로 반환하세요.\n입력: ${text}\n규칙:\n1. 카테고리: 과학·자연/역사·인물/사회·생각/그림책·동화/모험·판타지/우정·성장/세계 명작/국내 창작 중 하나\n2. section: 비문학 또는 문학\n3. note: 8~10세 아이에게 흥미를 주는 한마디 (20자 이내)\n4. 순수 JSON만 반환. 다른 텍스트 없이.\n형식: [{"title":"제목","pub":"출판사","cat":"카테고리","section":"비문학또는문학","note":"한마디"}]`;
  try {
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    const raw=data.content.map(b=>b.text||'').join('');
    const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
    const maxN=books.reduce((m,b)=>Math.max(m,b.n||0),0);
    parsed.forEach((b,i)=>books.push({id:Date.now()+i,n:maxN+i+1,title:b.title||'제목없음',pub:b.pub||'',cat:b.cat||'기타',section:b.section||'문학',note:b.note||'',read:false}));
    saveBooks(); render(); document.getElementById('ai-input').value='';
  } catch(e){alert('오류: '+e.message);}
  finally{btn.disabled=false;loading.classList.remove('active');}
}

function manualAdd() {
  const title=document.getElementById('m-title').value.trim();
  if(!title){alert('제목을 입력해주세요.');return;}
  const maxN=books.reduce((m,b)=>Math.max(m,b.n||0),0);
  books.push({id:Date.now(),n:maxN+1,title,pub:document.getElementById('m-pub').value.trim(),cat:document.getElementById('m-cat').value.trim()||'기타',section:document.getElementById('m-section').value.trim()||'문학',note:'',read:false});
  saveBooks(); render(); ['m-title','m-pub','m-cat','m-section'].forEach(id=>document.getElementById(id).value='');
}

function resetAll() {
  if(!confirm('목록을 초기화하면 읽음 체크, 추가된 책, 표지 사진이 모두 사라집니다. 계속할까요?')) return;
  localStorage.removeItem(KEY); localStorage.removeItem(PHOTO_KEY); photos={}; loadData(); render();
}

loadData(); render();
